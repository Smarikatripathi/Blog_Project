<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>My Tech Blog</title>

    <!-- Bootstrap 5 ONLY -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Medium Editor -->
    <script src="//cdn.jsdelivr.net/medium-editor/latest/js/medium-editor.min.js"></script>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/medium-editor/latest/css/medium-editor.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/blog.css' %}">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
  <div class="container">

    <a class="navbar-brand brand-title" href="{% url 'post_list' %}">
        Smarika Tripathi
    </a>

    <div class="ms-auto">

        <a href="{% url 'post_list' %}" class="btn btn-sm btn-outline-light">Home</a>
        <a href="{% url 'about' %}" class="btn btn-sm btn-outline-light">About</a>
        <a href="https://github.com/Smarikatripathi" class="btn btn-sm btn-outline-light">GitHub</a>
        <a href="https://www.linkedin.com/in/smarika-tripathi-305273257/" class="btn btn-sm btn-outline-light">LinkedIn</a>

        {% if user.is_authenticated %}
            <a href="{% url 'post_new' %}" class="btn btn-sm btn-success">New Post</a>
            <a href="{% url 'post_draft_list' %}" class="btn btn-sm btn-warning">Drafts</a>

            <form method="POST" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button class="btn btn-sm btn-danger">Logout</button>
            </form>

            <span class="text-white ms-2">Hi {{ user.username }}</span>

        {% else %}
            <a href="{% url 'login' %}" class="btn btn-sm btn-primary">Login</a>
        {% endif %}

    </div>
  </div>
</nav>

<!-- CONTENT -->
<div class="container content">
    <div class="row">
        <div class="col-md-8 offset-md-2">

            {% block content %}
            {% endblock %}

        </div>
    </div>
</div>

<script src="{% static 'js/blog.js' %}"></script>

</body>
</html>
